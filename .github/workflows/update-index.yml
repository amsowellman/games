name: Update Game Index
on:
  push:
    branches: [main]

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: \${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate index.html
        run: |
          python3 << 'EOF'
          import os

          # Thumbnail filenames to look for (in priority order)
          THUMB_NAMES = [
              'thumbnail', 'cover', 'banner', 'thumb',
              'preview', 'icon', 'poster', 'card'
          ]
         
